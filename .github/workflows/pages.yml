name: Deploy review site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time; newer pushes supersede in-flight runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt

      # Each study bakes its own self-contained view dir (index.html + data.js + core.js).
      - run: python studies/conduct/views/plot.py      # reads/markers_grid.png (from the committed markers.json)
      - run: python studies/conduct/views/build.py     # conduct: views/data.js + core.js
      - run: python studies/language/views/build.py    # language: views/data.js + core.js
      - run: python studies/consensus/views/build.py   # consensus: views/data.js (self-contained)
      - run: python studies/convergence/views/build.py # convergence: views/data.js (answers-only)
      - run: python studies/structured/views/build.py  # structured: views/data.js (plain-vs-format)

      # Assemble one Pages tree: a landing index + each study at its own slug. Pages serves
      # a single artifact, so multiple studies share one site via subpaths, not separate URLs.
      - name: Assemble combined site
        run: |
          mkdir -p site
          cp docs/site-index.html site/index.html
          cp -r studies/conduct/views  site/conduct
          cp -r studies/language/views site/language
          cp -r studies/consensus/views site/consensus
          cp -r studies/convergence/views site/convergence
          cp -r studies/structured/views site/structured

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
