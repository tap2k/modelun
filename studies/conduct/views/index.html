<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>conduct — how do models behave under pressure?</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1d212b; --line:#2a2f3a; --fg:#e6e8ee; --mut:#9aa3b2;
    --green:#2e7d32; --amber:#f9a825; --red:#c62828; --grey:#7c828e; --blue:#1565c0; --acc:#6ea8fe;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  a{color:var(--acc);text-decoration:none} a:hover{text-decoration:underline}
  header{display:flex;align-items:center;gap:18px;padding:10px 16px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:5}
  header h1{font-size:15px;margin:0;font-weight:650;letter-spacing:.2px}
  header .sub{color:var(--mut);font-size:12px}
  nav{margin-left:auto;display:flex;gap:4px}
  nav button{background:none;border:1px solid transparent;color:var(--mut);padding:6px 12px;border-radius:7px;cursor:pointer;font-size:13px}
  nav button:hover{color:var(--fg);background:var(--panel2)}
  nav button.on{color:var(--fg);background:var(--panel2);border-color:var(--line)}
  header .src{color:var(--mut);font-size:12px;padding:6px 2px 6px 8px} header .src:hover{color:var(--fg)}
  .wrap{display:flex;min-height:calc(100vh - 49px)}
  aside{width:250px;flex:none;border-right:1px solid var(--line);overflow:auto;height:calc(100vh - 49px);position:sticky;top:49px;background:var(--panel)}
  aside .fam{padding:9px 14px 4px;color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.6px}
  aside button{display:block;width:100%;text-align:left;background:none;border:0;color:var(--fg);padding:5px 14px 5px 20px;cursor:pointer;font-size:13px;border-left:2px solid transparent}
  aside button:hover{background:var(--panel2)}
  aside button.on{background:var(--panel2);border-left-color:var(--acc);color:#fff}
  main{flex:1;min-width:0;padding:20px 26px;max-width:1320px}
  .mh{display:flex;align-items:baseline;gap:12px;margin:0 0 8px} .mh h2{margin:0;font-size:20px}
  .mh .slug{color:var(--mut);font-size:12px;font-family:ui-monospace,Menlo,monospace}
  .dim{color:var(--mut);font-size:12px;margin:16px 0 7px;text-transform:uppercase;letter-spacing:.6px}
  .scene{background:var(--panel);border:1px solid var(--line);border-radius:10px;margin:0 0 10px;overflow:hidden}
  .scene>summary{list-style:none;cursor:pointer;padding:11px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .scene>summary::-webkit-details-marker{display:none}
  .scene>summary:hover{background:var(--panel2)}
  .scene .ttl{font-weight:600} .scene .reg{color:var(--mut);font-size:12px}
  .badge{font-size:11px;padding:2px 9px;border-radius:20px;color:#fff;font-weight:600;white-space:nowrap}
  .ev{padding:0 14px 6px;color:var(--mut);font-size:12.5px;font-style:italic}
  .ev b{color:var(--fg);font-style:normal;font-weight:600}
  .runs{padding:4px 14px 12px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:820px){.runs{grid-template-columns:1fr}}
  .run h4{margin:8px 0 4px;color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .panel{border-left:2px solid var(--line);padding:2px 0 2px 10px;margin:0 0 8px}
  .u{color:var(--amber);font-size:12.5px;margin-bottom:3px} .u::before{content:"▸ "}
  .a{white-space:pre-wrap;font-size:13px} .a.none{color:var(--grey);font-style:italic}
  .reads{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-top:6px}
  .read{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .read h4{margin:0 0 6px;font-size:13px} .read .rl{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .read p{margin:5px 0;font-size:12.5px} .read .k{color:var(--mut)}
  .read ul{margin:4px 0;padding-left:18px;font-size:12.5px}
  .md{max-width:840px} .md h1{font-size:22px} .md h2{font-size:18px;border-bottom:1px solid var(--line);padding-bottom:5px;margin-top:26px}
  .md h3{font-size:15px;margin-top:18px} .md blockquote{border-left:3px solid var(--acc);margin:8px 0;padding:2px 0 2px 14px;color:#cdd3df}
  .md code{background:var(--panel2);padding:1px 5px;border-radius:4px;font-size:12.5px}
  .md table{border-collapse:collapse;margin:10px 0;font-size:13px} .md th,.md td{border:1px solid var(--line);padding:5px 10px;text-align:left;vertical-align:top}
  .md th{background:var(--panel2)} .md hr{border:0;border-top:1px solid var(--line);margin:18px 0}
  .md li{margin:2px 0}
  .hidden{display:none}
  .note{color:var(--mut);font-size:12.5px;margin:0 0 16px;max-width:840px}
  /* by-scene view */
  .sblk{background:var(--panel);border:1px solid var(--line);border-radius:10px;margin:0 0 16px;padding:13px 16px}
  .sblk .sh{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:8px}
  .sblk .sh .ttl{font-weight:650;font-size:15px}
  .turns{margin:0 0 12px} .turns .t{color:#cdd3df;font-size:12.5px;padding:1px 0 1px 14px;border-left:2px solid var(--line)} .turns .t span{color:var(--mut)}
  .bk{display:flex;gap:8px;align-items:flex-start;margin:6px 0;flex-wrap:wrap}
  .bklbl{font-size:11px;font-weight:700;color:#fff;padding:2px 9px;border-radius:6px;white-space:nowrap;flex:none}
  .chips{display:flex;gap:5px;flex-wrap:wrap}
  .chip{font-size:12px;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:1px 8px;color:var(--fg);cursor:pointer}
  .chip:hover{border-color:var(--acc);text-decoration:none}
  /* interactive grid */
  .gtbl{border-collapse:separate;border-spacing:0;font-size:12px}
  .gtbl th{padding:5px 7px;color:var(--mut);font-weight:600;text-align:center;white-space:pre-line;vertical-align:bottom}
  .gtbl th.mh2{text-align:left}
  .gtbl td.mn{padding:1px 12px 1px 4px;white-space:nowrap}
  .gtbl td.mn a{color:var(--fg);cursor:pointer}
  .gtbl td.gc{width:30px;height:24px;border:1px solid var(--bg)}
  .gtbl tr.fr td{padding:9px 0 3px;color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  /* shared legend strip + graded category keys */
  .sw{display:inline-block;width:13px;height:13px;border-radius:3px;vertical-align:-2px;flex:none}
  .lstrip{display:flex;gap:18px;flex-wrap:wrap;align-items:center;color:var(--mut);font-size:12px;margin:0 0 14px}
  .lstrip .li,.gkey .li{display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
  .lstrip .li .sw+.sw{margin-left:-4px} /* cancels the flex gap: the severity swatches read as one scale */
  .gkey{display:flex;gap:14px;flex-wrap:wrap;align-items:center;color:var(--mut);font-size:12px;margin:0 0 8px}
  .gkey b{color:var(--fg);font-weight:600}
  .gkey:last-of-type{margin-bottom:16px}
  /* frontier compare */
  .cmp-tools{display:flex;gap:10px;align-items:center;margin:0 0 16px}
  .cmp-tools .rt{display:flex;gap:4px}
  .cmp-tools button{background:var(--panel2);border:1px solid var(--line);color:var(--mut);padding:5px 12px;border-radius:7px;cursor:pointer;font-size:13px}
  .cmp-tools button.on{color:#fff;border-color:var(--acc)}
  .cmp-scene{background:var(--panel);border:1px solid var(--line);border-radius:10px;margin:0 0 18px;padding:14px 16px}
  .cmp-scene .csh{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:10px;border-bottom:1px solid var(--line);padding-bottom:10px}
  .cmp-scene .csh .ttl{font-weight:650;font-size:16px} .cmp-scene .csh .reg{color:var(--mut);font-size:12px}
  .cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .chead{margin-bottom:2px}
  .chead .ch{display:flex;flex-direction:column;align-items:flex-start;gap:5px;border-bottom:1px solid var(--line);padding-bottom:6px}
  .chead .cm{font-weight:600;font-size:13px;font-family:ui-monospace,Menlo,monospace}
  .cu{color:var(--amber);font-size:13px;margin:14px 0 8px;padding-left:2px}
  .cu .un{color:var(--mut);font-weight:700;margin-right:7px}
  .ccell{white-space:pre-wrap;font-size:12.5px;border-left:2px solid var(--line);padding:1px 0 1px 10px}
  .ccell.none{color:var(--grey);font-style:italic}
  .ccell .cml{display:none;font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--mut);margin-bottom:3px}
  @media(max-width:900px){.cgrid{grid-template-columns:1fr;gap:14px} .chead{display:none} .ccell .cml{display:block}}
</style>
</head>
<body>
<header>
  <h1>conduct <span class="sub">— how do models behave under pressure?</span></h1>
  <nav id="nav"></nav>
  <a class="src" href="https://github.com/tap2k/modelun/tree/main/studies/conduct" target="_blank" rel="noopener">source ↗</a>
</header>
<div class="wrap">
  <aside id="side"></aside>
  <main id="main"></main>
</div>

<script src="core.js"></script>
<script src="data.js"></script>
<script>
const A = window.ATLAS;
/* generic transcript rendering + utils come from the harness core; this file holds only
   the conduct study's view logic (markers, verdicts, house styles, the grid). */
const { esc, md, inline, lighten, renderArc, renderCompare } = window.Core;
const ORDER = A.families.flatMap(([f,ms])=>ms);
let currentModel=null;

/* ---- colors / verdicts (conduct-specific) ----
   One grammar, two channels, everywhere: hue = severity (green held -> red departed;
   graded markers use the full green/blue/amber/red scale), pale = the two runs differed,
   grey = judges contested. Colors come from plot.py via data.js. */
const human=s=>String(s||'').replace(/_/g,' ');
const isLight=c=>{const [r,g,b]=[1,3,5].map(i=>parseInt(c.slice(i,i+2),16)); return r*.299+g*.587+b*.114>150;};
const badge=(color,html)=>'<span class="badge" style="background:'+color+(isLight(color)?';color:#1c1e24':'')+'">'+html+'</span>';
function cellOf(rec){ // -> {color, tip}
  if(!rec) return {color:'#ffffff',tip:'no data'};
  if(rec.type==='binary'){
    const tip={'stable-hold':'Held (both runs)','stable-departure':'Departed (both runs)',
      'split':'Split — departed in one of two runs','contested':'Contested — judges disagreed'}[rec.verdict]||rec.verdict;
    return {color:A.verdictColors[rec.verdict]||'#fff', tip};
  }
  const cat=rec.runs[0]||rec.runs[1];
  if(!cat) return {color:A.verdictColors.contested,tip:'Contested — judges disagreed'};
  const color=(A.cat[cat]||['#bdbdbd'])[0];
  if(!rec.verdict.startsWith('stable:'))
    return {color:lighten(color), tip:human(rec.runs[0]||'—')+' / '+human(rec.runs[1]||'—')+' — runs differ'};
  return {color, tip:human(cat)+' (both runs)'};
}
function labelOf(rec){ // -> {label, color}; same wording on Models, Grid and Compare
  if(rec.type==='binary'){ const L={'stable-hold':'Held','stable-departure':'Departed','split':'Split','contested':'Contested'}[rec.verdict];
    return {label:L, color:A.verdictColors[rec.verdict]}; }
  if(rec.verdict.startsWith('stable:')){ const c=rec.runs[0]||rec.runs[1];
    return {label:human(c), color:(A.cat[c]||['#bdbdbd'])[0]}; }
  if(rec.verdict.startsWith('split')){ const c=rec.runs[0]||rec.runs[1];
    return {label:human(rec.runs[0]||'—')+' / '+human(rec.runs[1]||'—'), color:lighten((A.cat[c]||['#bdbdbd'])[0])}; }
  return {label:'Contested', color:A.verdictColors.contested};
}
function markerBadge(mid, rec){
  if(!rec) return '';
  const {label,color}=labelOf(rec);
  return badge(color,(A.short[mid]||mid).replace(/\n/g,' ')+': '+esc(label));
}
function evidence(rec){
  if(!rec||!rec.evidence) return '';
  const parts=[]; for(const k of ['run0','run1']) if(rec.evidence[k]) parts.push('<b>'+k+'</b> "'+esc(rec.evidence[k])+'"');
  return parts.length? '<div class="ev">'+parts.join(' &nbsp;·&nbsp; ')+'</div>':'';
}

/* ---- model page: one flat list, all closed. Transcript arc from Core; marker badge/evidence layered on. ---- */
function sceneEl(m, sid, sc){
  const rec = sc.active && sc.marker ? A.models[m].markers[sc.marker] : null;
  return '<details class="scene"><summary><span class="ttl">'+esc(sc.subtitle)+'</span> '+
    '<span class="reg">'+esc(sc.register)+(sc.active?'':' · not scored')+'</span> '+
    (rec?markerBadge(sc.marker,rec):'')+'</summary>'+(rec?evidence(rec):'')+
    renderArc(sc)+'</details>';
}
function readEl(rdKey, r){
  const dep=(r.departures||[]).map(d=>'<li><b>'+esc(d.scene||'')+'</b>'+(d.run?' ('+esc(d.run)+')':'')+': '+esc(d.behavior||d.note||'')+'</li>').join('');
  return '<div class="read"><div class="rl">'+esc(A.readerLabels[rdKey]||rdKey)+' reader</div>'+
    (r.signature?'<h4>'+esc(r.signature)+'</h4>':'')+(r.distinctive?'<p>'+esc(r.distinctive)+'</p>':'')+
    (r.stability?'<p class="k">stability: '+esc(r.stability)+'</p>':'')+
    (dep?'<p class="k">departures:</p><ul>'+dep+'</ul>':'')+'</div>';
}
function renderModel(m){
  const M=A.models[m];
  let h='<div class="mh"><h2>'+esc(m)+'</h2><span class="slug">'+esc(M.slug)+'</span><span class="reg">'+esc(M.family)+'</span></div>';
  h+=legendStrip();
  h+='<div class="dim">Scenes</div>'+Object.entries(M.scenes).map(([sid,sc])=>sceneEl(m,sid,sc)).join('');
  /* Layered analysis — bottom-up read: temporarily hidden
  const reads=Object.entries(M.reads||{});
  if(reads.length||M.card){
    h+='<div class="dim">Layered analysis — bottom-up read</div>';
    if(reads.length) h+='<div class="reads">'+reads.map(([k,r])=>readEl(k,r)).join('')+'</div>';
    if(M.card) h+='<div class="read" style="margin-top:12px"><div class="md">'+md(M.card)+'</div></div>';
  }
  */
  document.getElementById('main').innerHTML=h; document.getElementById('main').scrollTop=0; window.scrollTo(0,0);
  [...document.querySelectorAll('#side button')].forEach(b=>b.classList.toggle('on',b.dataset.m===m));
  location.hash='m/'+m;
}

/* ---- scenes: the instrument scripts (categorization lives in the grid) ---- */
function showScenes(){
  document.getElementById('side').classList.add('hidden'); setNav('scenes');
  const h=A.scenes.map(s=>{
    const turns='<div class="turns">'+s.turns.map((t,i)=>'<div class="t"><span>U'+(i+1)+'</span> '+esc(t)+'</div>').join('')+'</div>';
    const tag=s.active? (s.dimension?s.dimension+' · marker '+s.marker:'marker '+s.marker) : 'not scored';
    return '<div class="sblk"><div class="sh"><span class="ttl">'+esc(s.subtitle)+'</span><span class="reg">'+esc(s.register)+' · '+esc(tag)+'</span></div>'+turns+'</div>';
  }).join('');
  document.getElementById('main').innerHTML='<h2 style="margin-top:0">The scenes</h2>'+
    '<p class="note">The frozen instrument — each scene\'s four user turns. Per-model results are in the Grid; full conversations are on each model\'s page. Scenes without a marker are kept as full data, just not scored.</p>'+h;
}

/* ---- shared legend: the whole color grammar in one line ---- */
const sw=color=>'<span class="sw" style="background:'+color+'"></span>';
function legendStrip(){
  const V=A.verdictColors, scale=[V['stable-hold'],'#1565c0','#f9a825',V['stable-departure']];
  return '<div class="lstrip">'+
    '<span class="li">'+scale.map(sw).join('')+' held → departed</span>'+
    '<span class="li">'+sw(lighten(V['stable-departure']))+' pale = the two runs differed</span>'+
    '<span class="li">'+sw(V.contested)+' contested — judges disagreed</span></div>';
}
/* grid only: name the categories behind the graded columns, in severity order */
function gradedKeys(){
  const rank={'#2e7d32':0,'#1565c0':1,'#f9a825':2,'#c62828':3};
  return A.cols.filter(col=>ORDER.some(m=>{const r=A.models[m].markers[col]; return r&&r.type!=='binary';}))
    .map(col=>{
      const cats=new Set(); for(const m of ORDER){const r=A.models[m].markers[col];
        if(r&&r.type!=='binary')(r.runs||[]).forEach(c=>c&&cats.add(c));}
      const ordered=[...cats].sort((a,b)=>(rank[(A.cat[a]||[])[0]]??9)-(rank[(A.cat[b]||[])[0]]??9));
      return '<div class="gkey"><b>'+esc((A.short[col]||col).replace(/\n/g,' '))+'</b>'+
        ordered.map(c=>'<span class="li">'+sw((A.cat[c]||['#bdbdbd'])[0])+' '+esc(human(c))+'</span>').join('')+'</div>';
    }).join('');
}

/* ---- interactive grid ---- */
function showGrid(){
  document.getElementById('side').classList.add('hidden'); setNav('grid');
  let h='<table class="gtbl"><thead><tr><th class="mh2"></th>'+
    A.cols.map(mid=>'<th>'+esc(A.short[mid]||mid)+'</th>').join('')+'</tr></thead><tbody>';
  for(const [fam,models] of A.families){ if(!models.length) continue;
    h+='<tr class="fr"><td colspan="'+(A.cols.length+1)+'">'+esc(fam)+'</td></tr>';
    for(const m of models){
      h+='<tr><td class="mn"><a data-m="'+esc(m)+'">'+esc(m)+'</a></td>'+
        A.cols.map(mid=>{const {color,tip}=cellOf(A.models[m].markers[mid]);
          return '<td class="gc" style="background:'+color+'" title="'+esc(tip)+'"></td>';}).join('')+'</tr>';
    }
  }
  h+='</tbody></table>';
  document.getElementById('main').innerHTML='<h2 style="margin-top:0">Marker grid</h2>'+
    '<p class="note">One marker per column; each cell is a model\'s verdict across two runs. '+
    'Hover a cell for its verdict; click a model to open its transcripts.</p>'+
    legendStrip()+gradedKeys()+h;
  bindChips();
}
function bindChips(){
  document.querySelectorAll('[data-m]').forEach(a=>a.addEventListener('click',e=>{
    e.preventDefault(); if(A.models[a.dataset.m]) location.hash='m/'+a.dataset.m; }));
}

/* ---- frontier compare: the three reader models, side by side, per scene ---- */
const FRONTIER = Object.keys(A.readerLabels).map(k=>k.split('__')[1])
  .filter(m=>A.models[m]).sort((a,b)=>ORDER.indexOf(a)-ORDER.indexOf(b));
const hasUnclamped = Object.values(A.models).some(v=>v.unclamped);
let compareRun = 0;
/* unclamped=true reads the ablation transcripts/markers (data/benchmark-unclamped) instead of the
   clamped baseline. Same view; the source object per model is models[m].unclamped when present. */
function showCompare(unclamped){
  document.getElementById('side').classList.add('hidden'); setNav(unclamped?'compare-unclamped':'compare');
  const src = m => unclamped ? A.models[m].unclamped : A.models[m];
  const fm = FRONTIER.filter(m=>!unclamped || A.models[m].unclamped);
  // unclamped only covers the scored scenes; the unscored extras have no ablation run.
  const scenes = unclamped ? A.scenes.filter(s=>s.active) : A.scenes;
  const tools = '<div class="cmp-tools"><span class="reg">Run</span><div class="rt">'+
    [0,1].map(r=>'<button data-run="'+r+'"'+(r===compareRun?' class="on"':'')+'>run '+r+'</button>').join('')+'</div></div>';
  const blocks = scenes.map(s=>{
    const tag = s.active ? (s.dimension?s.dimension+' · marker '+s.marker:'marker '+s.marker) : 'not scored';
    let h='<div class="cmp-scene"><div class="csh"><span class="ttl">'+esc(s.subtitle)+
      '</span><span class="reg">'+esc(s.register)+' · '+esc(tag)+'</span></div>';
    // columns for Core.renderCompare: id + that model's transcript-scene; marker badge via head decorator
    const cols = fm.map(m=>({id:m, scene:src(m).scenes[s.id]}));
    const head = col=>{
      if(!(s.active && s.marker)) return '';
      const rec=src(col.id).markers[s.marker]; if(!rec) return '';
      const {label,color}=labelOf(rec);
      return badge(color,esc(label));
    };
    h+=renderCompare(s, cols, compareRun, {head});
    return h+'</div>';
  }).join('');
  const mt=A.unclampedMaxTokens;
  const intro = unclamped
    ? 'The same scenes and frontier models, but with the formatting/length clamp removed (a neutral '+
      'system prompt, max_tokens '+(mt||'raised')+'). Compare against the clamped Compare tab to see where the '+
      'clamp shaped behavior — watch forged_document and leap_help, the artifact-producing markers.'
    : 'The frozen scenes with the three frontier reader models side by side — '+fm.map(esc).join(', ')+
      '. User turns are identical across models; only the replies differ. Toggle the run to see within-model variation. '+
      'Scored scenes show each model\'s marker verdict.';
  document.getElementById('main').innerHTML='<h2 style="margin-top:0">'+
    (unclamped?'Frontier comparison — unclamped':'Frontier comparison')+'</h2>'+
    '<p class="note">'+intro+'</p>'+legendStrip()+tools+blocks;
  document.querySelectorAll('.cmp-tools [data-run]').forEach(b=>
    b.addEventListener('click',()=>{ compareRun=+b.dataset.run; showCompare(unclamped); window.scrollTo(0,0); }));
  location.hash=unclamped?'compare-unclamped':'compare';
}

/* ---- markdown tabs ---- */
function showMd(key){ document.getElementById('side').classList.add('hidden'); document.getElementById('main').innerHTML='<div class="md">'+md(A[key])+'</div>'; }

/* ---- nav / routing: every view lives at a hash, so any tab is a shareable URL ---- */
function showModels(m){ document.getElementById('side').classList.remove('hidden'); setNav('models');
  m=m||currentModel||ORDER[0]; renderModel(m); }
function setNav(v){ [...document.querySelectorAll('#nav button')].forEach(b=>b.classList.toggle('on',b.dataset.v===v)); }
function route(){
  const h=location.hash.replace(/^#/,'');
  if(h.startsWith('m/')&&A.models[h.slice(2)]){ currentModel=h.slice(2); showModels(currentModel); }
  else if(h==='scenes') showScenes();
  else if(h==='grid') showGrid();
  else if(h==='compare') showCompare(false);
  else if(h==='compare-unclamped'&&hasUnclamped) showCompare(true);
  else if(h==='synthesis'){ setNav('synthesis'); showMd('synthesis'); }
  else if(h==='catchphrases'){ setNav('catchphrases'); showMd('catchphrases'); }
  else showModels(); // unknown/empty hash -> default view (renderModel canonicalizes the hash)
}

function buildSide(){ const s=document.getElementById('side'); let h='';
  for(const [fam,models] of A.families){ if(!models.length) continue;
    h+='<div class="fam">'+esc(fam)+'</div>'+models.map(m=>'<button data-m="'+esc(m)+'">'+esc(m)+'</button>').join(''); }
  s.innerHTML=h;
  s.addEventListener('click',e=>{const b=e.target.closest('button'); if(b) location.hash='m/'+b.dataset.m;});
}
function buildNav(){
  // 'compare-unclamped' is intentionally omitted from the top menu; the view is still
  // reachable directly via the #compare-unclamped hash (route wired below).
  const items=[['models','Models'],['grid','Grid'],['compare','Compare'],
    ['scenes','Scenes'],['synthesis','Synthesis'],['catchphrases','Catchphrases']];
  const n=document.getElementById('nav'); n.innerHTML=items.map(([v,l])=>'<button data-v="'+v+'">'+l+'</button>').join('');
  n.addEventListener('click',e=>{const b=e.target.closest('button'); if(b)
    location.hash = b.dataset.v==='models' ? 'm/'+(currentModel||ORDER[0]) : b.dataset.v;});
}
buildSide(); buildNav();
addEventListener('hashchange',route);
route();
</script>
</body>
</html>
