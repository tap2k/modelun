<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlas — review</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1d212b; --line:#2a2f3a; --fg:#e6e8ee; --mut:#9aa3b2;
    --green:#2e7d32; --amber:#f9a825; --red:#c62828; --grey:#7c828e; --blue:#1565c0; --acc:#6ea8fe;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  a{color:var(--acc);text-decoration:none} a:hover{text-decoration:underline}
  header{display:flex;align-items:center;gap:18px;padding:10px 16px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:5}
  header h1{font-size:15px;margin:0;font-weight:650;letter-spacing:.2px}
  header .sub{color:var(--mut);font-size:12px}
  nav{margin-left:auto;display:flex;gap:4px}
  nav button{background:none;border:1px solid transparent;color:var(--mut);padding:6px 12px;border-radius:7px;cursor:pointer;font-size:13px}
  nav button:hover{color:var(--fg);background:var(--panel2)}
  nav button.on{color:var(--fg);background:var(--panel2);border-color:var(--line)}
  .wrap{display:flex;min-height:calc(100vh - 49px)}
  aside{width:250px;flex:none;border-right:1px solid var(--line);overflow:auto;height:calc(100vh - 49px);position:sticky;top:49px;background:var(--panel)}
  aside .fam{padding:9px 14px 4px;color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.6px}
  aside button{display:block;width:100%;text-align:left;background:none;border:0;color:var(--fg);padding:5px 14px 5px 20px;cursor:pointer;font-size:13px;border-left:2px solid transparent}
  aside button:hover{background:var(--panel2)}
  aside button.on{background:var(--panel2);border-left-color:var(--acc);color:#fff}
  main{flex:1;min-width:0;padding:20px 26px;max-width:1040px}
  .mh{display:flex;align-items:baseline;gap:12px;margin:0 0 8px} .mh h2{margin:0;font-size:20px}
  .mh .slug{color:var(--mut);font-size:12px;font-family:ui-monospace,Menlo,monospace}
  .dim{color:var(--mut);font-size:12px;margin:16px 0 7px;text-transform:uppercase;letter-spacing:.6px}
  .scene{background:var(--panel);border:1px solid var(--line);border-radius:10px;margin:0 0 10px;overflow:hidden}
  .scene>summary{list-style:none;cursor:pointer;padding:11px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .scene>summary::-webkit-details-marker{display:none}
  .scene>summary:hover{background:var(--panel2)}
  .scene .ttl{font-weight:600} .scene .reg{color:var(--mut);font-size:12px}
  .badge{font-size:11px;padding:2px 9px;border-radius:20px;color:#fff;font-weight:600;white-space:nowrap}
  .ev{padding:0 14px 6px;color:var(--mut);font-size:12.5px;font-style:italic}
  .ev b{color:var(--fg);font-style:normal;font-weight:600}
  .runs{padding:4px 14px 12px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:820px){.runs{grid-template-columns:1fr}}
  .run h4{margin:8px 0 4px;color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .panel{border-left:2px solid var(--line);padding:2px 0 2px 10px;margin:0 0 8px}
  .u{color:var(--amber);font-size:12.5px;margin-bottom:3px} .u::before{content:"▸ "}
  .a{white-space:pre-wrap;font-size:13px} .a.none{color:var(--grey);font-style:italic}
  .reads{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-top:6px}
  .read{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .read h4{margin:0 0 6px;font-size:13px} .read .rl{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .read p{margin:5px 0;font-size:12.5px} .read .k{color:var(--mut)}
  .read ul{margin:4px 0;padding-left:18px;font-size:12.5px}
  .md{max-width:840px} .md h1{font-size:22px} .md h2{font-size:18px;border-bottom:1px solid var(--line);padding-bottom:5px;margin-top:26px}
  .md h3{font-size:15px;margin-top:18px} .md blockquote{border-left:3px solid var(--acc);margin:8px 0;padding:2px 0 2px 14px;color:#cdd3df}
  .md code{background:var(--panel2);padding:1px 5px;border-radius:4px;font-size:12.5px}
  .md table{border-collapse:collapse;margin:10px 0;font-size:13px} .md th,.md td{border:1px solid var(--line);padding:5px 10px;text-align:left;vertical-align:top}
  .md th{background:var(--panel2)} .md hr{border:0;border-top:1px solid var(--line);margin:18px 0}
  .md li{margin:2px 0}
  .hidden{display:none}
  .selfj{font-size:10px;color:var(--amber);border:1px solid var(--amber);border-radius:4px;padding:0 4px;margin-left:4px}
  .note{color:var(--mut);font-size:12.5px;margin:0 0 16px;max-width:840px}
  /* by-scene view */
  .sblk{background:var(--panel);border:1px solid var(--line);border-radius:10px;margin:0 0 16px;padding:13px 16px}
  .sblk .sh{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:8px}
  .sblk .sh .ttl{font-weight:650;font-size:15px}
  .turns{margin:0 0 12px} .turns .t{color:#cdd3df;font-size:12.5px;padding:1px 0 1px 14px;border-left:2px solid var(--line)} .turns .t span{color:var(--mut)}
  .bk{display:flex;gap:8px;align-items:flex-start;margin:6px 0;flex-wrap:wrap}
  .bklbl{font-size:11px;font-weight:700;color:#fff;padding:2px 9px;border-radius:6px;white-space:nowrap;flex:none}
  .chips{display:flex;gap:5px;flex-wrap:wrap}
  .chip{font-size:12px;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:1px 8px;color:var(--fg);cursor:pointer}
  .chip:hover{border-color:var(--acc);text-decoration:none}
  /* interactive grid */
  .gtbl{border-collapse:separate;border-spacing:0;font-size:12px}
  .gtbl th{padding:5px 7px;color:var(--mut);font-weight:600;text-align:center;white-space:pre-line;vertical-align:bottom}
  .gtbl th.mh2{text-align:left}
  .gtbl td.mn{padding:1px 12px 1px 4px;white-space:nowrap}
  .gtbl td.mn a{color:var(--fg);cursor:pointer}
  .gtbl td.gc{width:30px;height:24px;text-align:center;color:#fff;border:1px solid var(--bg);font-size:11px}
  .gtbl tr.fr td{padding:9px 0 3px;color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
</style>
</head>
<body>
<header>
  <h1>Atlas <span class="sub">— transcript &amp; analysis review</span></h1>
  <nav id="nav"></nav>
</header>
<div class="wrap">
  <aside id="side"></aside>
  <main id="main"></main>
</div>

<script src="data.js"></script>
<script>
const A = window.ATLAS;
const esc = (s)=> (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const ORDER = A.families.flatMap(([f,ms])=>ms);
let currentModel=null;

/* ---- minimal markdown ---- */
function inline(s){
  s = esc(s);
  s = s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s = s.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  s = s.replace(/(^|[^*])\*([^*]+)\*/g,'$1<em>$2</em>');
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  return s;
}
function md(src){
  const lines=(src||'').split('\n'); let out=[],i=0;
  const isBlock=(s)=>/^\s*(#{1,6}\s|>|---|\*\*\*|___|\d+\.\s+|[-*]\s|\|.*\|\s*$|```)/.test(s);
  const list=(ol)=>{ let items=[];
    while(i<lines.length){
      const re = ol? /^\s*\d+\.\s+/ : /^\s*[-*]\s+/;
      if(re.test(lines[i])){ items.push(lines[i].replace(re,'')); i++; }
      else if(lines[i].trim()==='' ){ let j=i+1; while(j<lines.length&&lines[j].trim()==='')j++;
        if(j<lines.length&&re.test(lines[j])) i=j; else break; }      // loose list: skip blanks between items
      else if(items.length && !isBlock(lines[i])){ items[items.length-1]+=' '+lines[i].trim(); i++; } // wrapped continuation
      else break;
    }
    out.push((ol?'<ol>':'<ul>')+items.map(x=>'<li>'+inline(x)+'</li>').join('')+(ol?'</ol>':'</ul>'));
  };
  while(i<lines.length){
    let ln=lines[i];
    if(/^\s*```/.test(ln)){ let b=[]; i++; while(i<lines.length&&!/^\s*```/.test(lines[i])){b.push(esc(lines[i]));i++;} i++; out.push('<pre><code>'+b.join('\n')+'</code></pre>'); continue; }
    if(/^#{1,6}\s/.test(ln)){ const n=ln.match(/^#+/)[0].length; out.push('<h'+n+'>'+inline(ln.replace(/^#+\s/,''))+'</h'+n+'>'); i++; continue; }
    if(/^\s*(---|\*\*\*|___)\s*$/.test(ln)){ out.push('<hr>'); i++; continue; }
    if(/^\s*>/.test(ln)){ let b=[]; while(i<lines.length&&/^\s*>/.test(lines[i])){b.push(lines[i].replace(/^\s*>\s?/,''));i++;} out.push('<blockquote>'+md(b.join('\n'))+'</blockquote>'); continue; }
    if(/^\s*\|.*\|\s*$/.test(ln)&&i+1<lines.length&&/^\s*\|?[\s:|-]+\|?\s*$/.test(lines[i+1])){
      const row=r=>r.trim().replace(/^\||\|$/g,'').split('|').map(c=>c.trim());
      const head=row(ln); i+=2; let body=[];
      while(i<lines.length&&/^\s*\|.*\|\s*$/.test(lines[i])){body.push(row(lines[i]));i++;}
      out.push('<table><thead><tr>'+head.map(h=>'<th>'+inline(h)+'</th>').join('')+'</tr></thead><tbody>'+
        body.map(r=>'<tr>'+r.map(c=>'<td>'+inline(c)+'</td>').join('')+'</tr>').join('')+'</tbody></table>'); continue; }
    if(/^\s*[-*]\s+/.test(ln)){ list(false); continue; }
    if(/^\s*\d+\.\s+/.test(ln)){ list(true); continue; }
    if(ln.trim()===''){ i++; continue; }
    let b=[lines[i]]; i++;                                            // paragraph: always advance first (no hang)
    while(i<lines.length&&lines[i].trim()!==''&&!isBlock(lines[i])){ b.push(lines[i]); i++; }
    out.push('<p>'+inline(b.join(' '))+'</p>');
  }
  return out.join('\n');
}

/* ---- colors / verdicts ---- */
function lighten(hex,f){ f=f==null?.55:f; const n=parseInt(hex.slice(1),16); let r=n>>16,g=(n>>8)&255,b=n&255;
  r=Math.round(r+(255-r)*f); g=Math.round(g+(255-g)*f); b=Math.round(b+(255-b)*f);
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1); }
function cellOf(rec){ // -> {color, glyph}
  if(!rec) return {color:'#ffffff',glyph:''};
  if(rec.type==='binary'){ return {color:A.verdictColors[rec.verdict]||'#fff',
    glyph:{'stable-departure':'●','split':'◐','stable-hold':'','contested':'·'}[rec.verdict]||''}; }
  const cat=rec.runs[0]||rec.runs[1];
  if(!cat) return {color:A.verdictColors.contested,glyph:'·'};
  let cc=A.cat[cat]||['#bdbdbd','?'], color=cc[0];
  if(!rec.verdict.startsWith('stable:')) color=lighten(color);
  return {color, glyph:cc[1]};
}
function labelOf(rec){ // -> {label, color} for bucketing in the by-scene view
  if(rec.type==='binary'){ const L={'stable-hold':'Held','stable-departure':'Departed','split':'Split','contested':'Contested'}[rec.verdict];
    return {label:L, color:A.verdictColors[rec.verdict]}; }
  if(rec.verdict.startsWith('stable:')){ const c=rec.runs[0]||rec.runs[1]; const cc=A.cat[c]||['#bdbdbd',''];
    return {label:c+(cc[1]?' ('+cc[1]+')':''), color:cc[0]}; }
  if(rec.verdict.startsWith('split')) return {label:'Split', color:A.verdictColors.split};
  return {label:'Contested', color:A.verdictColors.contested};
}
function markerBadge(mid, rec){
  if(!rec) return '';
  const lbl=(A.short[mid]||mid).replace(/\n/g,' ');
  const {label,color}=labelOf(rec);
  const sj=rec.self_judged?'<span class="selfj">self-judged</span>':'';
  const text = rec.type==='binary'? label : (rec.runs[0]===rec.runs[1]?label:esc(rec.runs[0]||'—')+' / '+esc(rec.runs[1]||'—'));
  return '<span class="badge" style="background:'+color+'">'+lbl+': '+esc(text)+'</span>'+sj;
}
function evidence(rec){
  if(!rec||!rec.evidence) return '';
  const parts=[]; for(const k of ['run0','run1']) if(rec.evidence[k]) parts.push('<b>'+k+'</b> "'+esc(rec.evidence[k])+'"');
  return parts.length? '<div class="ev">'+parts.join(' &nbsp;·&nbsp; ')+'</div>':'';
}

/* ---- model page: one flat list, all closed ---- */
function sceneEl(m, sid, sc){
  const rec = sc.active && sc.marker ? A.models[m].markers[sc.marker] : null;
  const runs = sc.runs.map((run,ri)=>{
    const panels=run.map(p=>'<div class="panel"><div class="u">'+esc(p.u)+'</div>'+
      '<div class="a'+(p.reply?'':' none')+'">'+(p.reply?esc(p.reply):'[no reply]')+'</div></div>').join('');
    return '<div class="run"><h4>run '+ri+'</h4>'+panels+'</div>';
  }).join('');
  return '<details class="scene"><summary><span class="ttl">'+esc(sc.subtitle)+'</span> '+
    '<span class="reg">'+esc(sc.register)+(sc.active?'':' · archived')+'</span> '+
    (rec?markerBadge(sc.marker,rec):'')+'</summary>'+(rec?evidence(rec):'')+
    '<div class="runs">'+runs+'</div></details>';
}
function readEl(rdKey, r){
  const dep=(r.departures||[]).map(d=>'<li><b>'+esc(d.scene||'')+'</b>'+(d.run?' ('+esc(d.run)+')':'')+': '+esc(d.behavior||d.note||'')+'</li>').join('');
  return '<div class="read"><div class="rl">'+esc(A.readerLabels[rdKey]||rdKey)+' reader</div>'+
    (r.signature?'<h4>'+esc(r.signature)+'</h4>':'')+(r.distinctive?'<p>'+esc(r.distinctive)+'</p>':'')+
    (r.stability?'<p class="k">stability: '+esc(r.stability)+'</p>':'')+
    (dep?'<p class="k">departures:</p><ul>'+dep+'</ul>':'')+'</div>';
}
function renderModel(m){
  const M=A.models[m];
  let h='<div class="mh"><h2>'+esc(m)+'</h2><span class="slug">'+esc(M.slug)+'</span><span class="reg">'+esc(M.family)+'</span></div>';
  h+='<div class="dim">Scenes</div>'+Object.entries(M.scenes).map(([sid,sc])=>sceneEl(m,sid,sc)).join('');
  const reads=Object.entries(M.reads||{});
  if(reads.length||M.card){
    h+='<div class="dim">Layered analysis — bottom-up read</div>';
    if(reads.length) h+='<div class="reads">'+reads.map(([k,r])=>readEl(k,r)).join('')+'</div>';
    if(M.card) h+='<div class="read" style="margin-top:12px"><div class="md">'+md(M.card)+'</div></div>';
  }
  document.getElementById('main').innerHTML=h; document.getElementById('main').scrollTop=0; window.scrollTo(0,0);
  [...document.querySelectorAll('#side button')].forEach(b=>b.classList.toggle('on',b.dataset.m===m));
  location.hash='m/'+m;
}

/* ---- by-scene view: script + categorized conversations ---- */
function sceneSummary(scene){
  const mid=scene.marker; if(!mid) return '';
  const buckets={};  // label -> {color, models:[{m,q}]}
  for(const m of ORDER){
    const rec=A.models[m].markers[mid]; if(!rec) continue;
    const {label,color}=labelOf(rec);
    const q=(rec.evidence&&(rec.evidence.run0||rec.evidence.run1))||'';
    (buckets[label]=buckets[label]||{color,models:[]}).models.push({m,q});
  }
  const ks=Object.keys(buckets).sort((a,b)=>buckets[b].models.length-buckets[a].models.length);
  return ks.map(k=>{const bk=buckets[k];
    return '<div class="bk"><span class="bklbl" style="background:'+bk.color+'">'+esc(k)+' ('+bk.models.length+')</span>'+
      '<span class="chips">'+bk.models.map(x=>'<a class="chip" data-m="'+esc(x.m)+'"'+(x.q?' title="'+esc(x.q)+'"':'')+'>'+esc(x.m)+'</a>').join('')+'</span></div>';
  }).join('');
}
function showScenes(){
  document.getElementById('side').classList.add('hidden'); setNav('scenes');
  const h=A.scenes.map(s=>{
    const turns='<div class="turns">'+s.turns.map((t,i)=>'<div class="t"><span>U'+(i+1)+'</span> '+esc(t)+'</div>').join('')+'</div>';
    const tag=s.active? (s.dimension?s.dimension+' · marker '+s.marker:'marker '+s.marker) : 'archived (not scored)';
    return '<div class="sblk"><div class="sh"><span class="ttl">'+esc(s.subtitle)+'</span><span class="reg">'+esc(s.register)+' · '+esc(tag)+'</span></div>'+
      turns + (s.active? sceneSummary(s) : '') + '</div>';
  }).join('');
  document.getElementById('main').innerHTML='<h2 style="margin-top:0">The scenes</h2>'+
    '<p class="note">Each scene\'s four user turns, then every model bucketed by how it responded (click a model to open its transcript; hover a chip for the trigger quote).</p>'+h;
  bindChips();
}

/* ---- interactive grid ---- */
function showGrid(){
  document.getElementById('side').classList.add('hidden'); setNav('grid');
  let h='<table class="gtbl"><thead><tr><th class="mh2"></th>'+
    A.cols.map(mid=>'<th>'+esc(A.short[mid]||mid)+'</th>').join('')+'</tr></thead><tbody>';
  for(const [fam,models] of A.families){ if(!models.length) continue;
    h+='<tr class="fr"><td colspan="'+(A.cols.length+1)+'">'+esc(fam)+'</td></tr>';
    for(const m of models){
      h+='<tr><td class="mn"><a data-m="'+esc(m)+'">'+esc(m)+'</a></td>'+
        A.cols.map(mid=>{const {color,glyph}=cellOf(A.models[m].markers[mid]);
          return '<td class="gc" style="background:'+color+'">'+glyph+'</td>';}).join('')+'</tr>';
    }
  }
  h+='</tbody></table>';
  document.getElementById('main').innerHTML='<h2 style="margin-top:0">Marker grid</h2>'+
    '<p class="note">Binary: ●departed ◐split, green=held, grey=contested. Graded: house letter (T=Therapist, C=Coach, A=Apologist), pale = runs differ. Click a model to open it.</p>'+h;
  bindChips();
}
function bindChips(){
  document.querySelectorAll('[data-m]').forEach(a=>a.addEventListener('click',e=>{
    e.preventDefault(); const m=a.dataset.m; if(A.models[m]){ currentModel=m; route('models',m);} }));
}

/* ---- markdown tabs ---- */
function showMd(key){ document.getElementById('side').classList.add('hidden'); document.getElementById('main').innerHTML='<div class="md">'+md(A[key])+'</div>'; }

/* ---- nav / routing ---- */
function showModels(m){ document.getElementById('side').classList.remove('hidden'); setNav('models');
  m=m||currentModel||ORDER[0]; renderModel(m); }
function setNav(v){ [...document.querySelectorAll('#nav button')].forEach(b=>b.classList.toggle('on',b.dataset.v===v)); }
function route(v,arg){ if(v==='models') showModels(arg);
  else if(v==='scenes') showScenes(); else if(v==='grid') showGrid();
  else if(v==='synthesis'){setNav('synthesis');showMd('synthesis');}
  else if(v==='catchphrases'){setNav('catchphrases');showMd('catchphrases');} }

function buildSide(){ const s=document.getElementById('side'); let h='';
  for(const [fam,models] of A.families){ if(!models.length) continue;
    h+='<div class="fam">'+esc(fam)+'</div>'+models.map(m=>'<button data-m="'+esc(m)+'">'+esc(m)+'</button>').join(''); }
  s.innerHTML=h;
  s.addEventListener('click',e=>{const b=e.target.closest('button'); if(b){currentModel=b.dataset.m; showModels(b.dataset.m);}});
}
function buildNav(){
  const items=[['models','Models'],['scenes','By scene'],['grid','Grid'],['synthesis','Synthesis'],['catchphrases','Catchphrases']];
  const n=document.getElementById('nav'); n.innerHTML=items.map(([v,l])=>'<button data-v="'+v+'">'+l+'</button>').join('');
  n.addEventListener('click',e=>{const b=e.target.closest('button'); if(b) route(b.dataset.v);});
}
buildSide(); buildNav();
const hash=location.hash.replace(/^#/,'');
if(hash.startsWith('m/')&&A.models[hash.slice(2)]){currentModel=hash.slice(2);route('models',currentModel);} else route('models');
</script>
</body>
</html>
